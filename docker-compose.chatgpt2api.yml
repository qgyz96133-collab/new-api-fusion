# ChatGPT2API Sidecar - 免费 ChatGPT Web → OpenAI API 转换服务
# 使用方式: docker compose -f docker-compose.yml -f docker-compose.chatgpt2api.yml up -d
#
# 架构: new-api-fusion → chatgpt2api sidecar → ChatGPT web backend
#
# 在 fusion 管理后台添加渠道:
#   类型: ChatGPT2API (Free Web) [77]
#   Base URL: http://chatgpt2api:80
#   Key: your-auth-key (与下方 CHATGPT2API_AUTH_KEY 一致)
#   模型: gpt-4o,gpt-5,gpt-image-2,auto

services:
  chatgpt2api:
    image: ghcr.io/basketikun/chatgpt2api:latest
    container_name: chatgpt2api
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      - ./data/chatgpt2api:/app/data
      - ./data/chatgpt2api/config.json:/app/config.json
    environment:
      - STORAGE_BACKEND=json
      - CHATGPT2API_AUTH_KEY=your-auth-key
      # 可选: 基础 URL (用于图片链接)
      # - CHATGPT2API_BASE_URL=https://your-domain.com
    networks:
      - default

  # 可选: WARP + FlareSolverr 稳定代理 (解决 Cloudflare 拦截)
